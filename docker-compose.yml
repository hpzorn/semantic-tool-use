version: '3.8'

services:
  # Main application
  app:
    build: .
    volumes:
      - ./src:/app/src
      - ./ontology:/app/ontology
      - ./data:/app/data
    env_file:
      - .env
    ports:
      - "8000:8000"

  # Apache Jena Fuseki SPARQL server
  fuseki:
    image: stain/jena-fuseki:latest
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
    ports:
      - "3030:3030"
    volumes:
      - fuseki-data:/fuseki

volumes:
  fuseki-data:
