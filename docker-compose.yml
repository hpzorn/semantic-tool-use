services:
  ontology-server:
    build: .
    volumes:
      - ./src:/app/src
      - ./ontology:/app/ontology
      - kg-data:/data/kg
    environment:
      - ONTOLOGY_AUTH_ENABLED=0
    ports:
      - "8100:8100"
    command: >
      uv run python -m ontology_server
      --http --host 0.0.0.0 --port 8100
      --enable-abox --kg-persist /data/kg
      --ontology-path /app/ontology/domain/visual-artifacts

volumes:
  kg-data:
